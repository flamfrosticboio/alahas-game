name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Zig
        uses: mlugg/setup-zig@v1
        with:
          version: master

      - name: Run Tests
        run: zig build test --summary all

      - name: Check Release Build (Windows x86_64)
        run: zig build -Dtarget=x86_64-windows -Doptimize=ReleaseSafe

      - name: Check Release Build (Linux x86_64)
        run: zig build -Dtarget=x86_64-linux-gnu -Doptimize=ReleaseSafe

