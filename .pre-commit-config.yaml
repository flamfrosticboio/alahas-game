repos:
  - repo: local
    hooks:
      - id: rust-fmt
        name: cargo fmt
        entry: cargo fmt --
        language: system
        types: [file]
        files: \.rs$
        stages: [pre-commit]

      - id: clippy
        name: cargo clippy
        entry: cargo clippy --all-targets --all-features -- -D warnings
        language: system
        types: [file]
        files: \.rs$
        pass_filenames: false
        stages: [pre-push]

  # License header
  - repo: https://github.com/Lucas-C/pre-commit-hooks
    rev: v1.5.5
    hooks:
      - id: insert-license
        name: insert AGPLv3 license
        files: \.zig$
        args:
          - --comment-style
          - //
          - --license-filepath
          - license_header.txt  
        stages: [pre-commit]

  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v4.0.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]
        args: [] 
